services:
  agmete:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist transaction history and blocked entities across restarts
      - ./data:/app/data
      # Persist trained ML models
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
